services:
  db:
    image: postgres:16
    container_name: algo-method-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sqluser
      POSTGRES_PASSWORD: sqlpass
      POSTGRES_DB: algomethod
    ports:
      - "5445:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./src:/workspace

volumes:
  db-data:
